<script data-cfasync="false">
  const hamburger = document.getElementById('hamburger');
  const navLinks = document.getElementById('navLinks');
  hamburger.addEventListener('click', () => {
    const open = navLinks.classList.toggle('open');
    hamburger.classList.toggle('open', open);
    hamburger.setAttribute('aria-expanded', open);
    document.body.style.overflow = open ? 'hidden' : '';
  });
  navLinks.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
    navLinks.classList.remove('open'); hamburger.classList.remove('open');
    hamburger.setAttribute('aria-expanded', 'false'); document.body.style.overflow = '';
  }));
  // Ensure seamless video looping
  const bgVideo = document.getElementById('bgVideo');
  if (bgVideo) {
    bgVideo.addEventListener('ended', () => {
      bgVideo.currentTime = 0;
      bgVideo.play();
    }, false);
    // Fallback for browsers with different loop behavior
    bgVideo.addEventListener('pause', () => {
      if (!bgVideo.ended) return;
      bgVideo.currentTime = 0;
      bgVideo.play();
    }, false);
  }
</script>
