  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: var(--sans); background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; -webkit-font-smoothing: antialiased; }
  .skip-link { position: absolute; top: -44px; left: 1rem; padding: 0.6rem 1.2rem; background: var(--gold); color: #0a0a0f; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; border-radius: 0 0 4px 4px; transition: top 0.2s ease; z-index: 9999; }

  main { position: relative; z-index: 2; text-align: center; padding: 2rem; max-width: 600px; }
  .error-num { font-family: var(--serif); font-size: clamp(6rem, 20vw, 12rem); font-weight: 300; line-height: 1; background: linear-gradient(135deg, var(--gold-light), var(--gold), #d4a843); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

  .home-btn { display: inline-flex; align-items: center; gap: 0.6rem; padding: 0.9rem 2.2rem; border: 1px solid var(--gold); color: var(--gold); font-family: var(--sans); font-size: 0.78rem; font-weight: 400; letter-spacing: 0.15em; text-transform: uppercase; text-decoration: none; transition: all 0.4s ease; position: relative; overflow: hidden; }
  .home-btn::before { content: ''; position: absolute; inset: 0; background: var(--gold); transform: scaleX(0); transform-origin: left; transition: transform 0.4s ease; z-index: -1; }
  .home-btn:hover { color: #0a0a0f; }
  .home-btn:hover::before { transform: scaleX(1); }
  .home-btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 4px; }
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 3; padding: 1.2rem 3rem; display: flex; justify-content: space-between; align-items: center; }
  .logo { font-family: var(--serif); font-size: 1.5rem; font-weight: 300; letter-spacing: 0.15em; color: var(--gold); text-decoration: none; text-transform: uppercase; }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 0.82rem; font-weight: 300; letter-spacing: 0.12em; text-transform: uppercase; transition: color 0.3s ease; }
  .nav-links a:hover { color: var(--gold-light); }
  .nav-links a:focus-visible { outline: 2px solid var(--gold); outline-offset: 4px; border-radius: 2px; }
  .hamburger { display: none; flex-direction: column; gap: 6px; cursor: pointer; background: none; border: none; padding: 8px; z-index: 1001; position: relative; }
  .hamburger span { display: block; width: 28px; height: 2px; background: var(--text-secondary); transition: all 0.3s ease; }
  .hamburger.open span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }
  @media (max-width: 768px) {
    nav { padding: 1rem 1.5rem; }
    .hamburger { display: flex; }
    .nav-links { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(10,10,15,0.97); flex-direction: column; align-items: center; justify-content: center; gap: 2.5rem; z-index: 999; }

<nav>

  <button class="hamburger" id="hamburger" aria-label="Toggle navigation" aria-expanded="false">
    <span></span><span></span><span></span>

    <li><a href="index.html">Home</a></li>

<main id="main-content">
  <p class="error-num">404</p>
  <h1 class="error-title">Page Not Found</h1>
  <p class="error-msg">The page you're looking for seems to have drifted into the digital void.<br>Let's get you back to familiar ground.</p>
  <a href="index.html" class="home-btn">Return to Homepage <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></a>
</main>
<script>
  const hamburger = document.getElementById('hamburger');
  const navLinks = document.getElementById('navLinks');
  hamburger.addEventListener('click', () => {
    const open = navLinks.classList.toggle('open');
    hamburger.classList.toggle('open', open);
    hamburger.setAttribute('aria-expanded', open);
    document.body.style.overflow = open ? 'hidden' : '';
  });
  navLinks.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
    navLinks.classList.remove('open'); hamburger.classList.remove('open');
    hamburger.setAttribute('aria-expanded', 'false'); document.body.style.overflow = '';
  }));
</script>
</body>
