name: Lighthouse Audit

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lighthouse-production-audit
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Use Node 22
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install locked Lighthouse version
        run: npm ci

      - name: Record audit environment
        run: |
          node --version
          google-chrome --version
          ./node_modules/.bin/lighthouse --version

      - name: Run three fixed production samples per page
        run: |
          set -euo pipefail
          mkdir -p reports
          targets=(
            "home|https://taiyzun.com/"
            "journey|https://taiyzun.com/journey"
            "creations|https://taiyzun.com/creations"
            "odyssey|https://taiyzun.com/odyssey"
            "connect|https://taiyzun.com/connect"
          )
          for target in "${targets[@]}"; do
            slug="${target%%|*}"
            url="${target#*|}"
            for sample in 1 2 3; do
              ./node_modules/.bin/lighthouse "$url" --quiet --throttling-method=simulate --output=json --output-path="reports/${slug}-mobile-${sample}.json" --only-categories=performance,accessibility,best-practices,seo --chrome-flags="--headless --no-sandbox"
            done
          done

      - name: Enforce production regression floor
        env:
          MIN_PERFORMANCE: '0.60'
          MIN_ACCESSIBILITY: '0.90'
          MIN_BEST_PRACTICES: '0.80'
          MIN_SEO: '0.90'
          MAX_LCP_MS: '6000'
          MAX_CLS: '0.15'
          MAX_TBT_MS: '600'
          MAX_TRANSFER_BYTES: '2000000'
        run: |
          set -euo pipefail
          for slug in home journey creations odyssey connect; do
            node scripts/assert-lighthouse.mjs --aggregate=median reports/${slug}-mobile-*.json
          done

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-production-mobile
          path: reports/
          retention-days: 14
