name: Lighthouse Audit

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 2 * * 1' # Weekly on Monday at 02:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lighthouse-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run Lighthouse (mobile)
        run: |
          mkdir -p reports
          npx -y lighthouse "https://taiyzun.com/odyssey" \
            --output json \
            --output-path ./reports/lighthouse-odyssey.json \
            --form-factor=mobile \
            --chrome-flags="--no-sandbox --headless"

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-report
          path: reports/

      - name: Print summary
        run: |
          echo "Lighthouse JSON uploaded as artifact 'lighthouse-report' (reports/)" 
