name: Production Smoke

on:
  schedule:
    - cron: '15 1 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-smoke
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Use Node 22
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Verify production routes, discovery, headers and social sharing
        run: npm run smoke:production
